<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/style.css">

</head>

<body>

<div class="wrapper">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="logo">

            📚 E-Library

        </div>

        <nav>

            <a href="dashboard.html" class="nav-link active">

                <i class="bi bi-house-door-fill"></i>

                Dashboard

            </a>

            <a href="kategori.html" class="nav-link">

                <i class="bi bi-tags-fill"></i>

                Kategori

            </a>

            <a href="penulis.html" class="nav-link">

                <i class="bi bi-person-fill"></i>

                Penulis

            </a>

            <a href="anggota.html" class="nav-link">

                <i class="bi bi-people-fill"></i>

                Anggota

            </a>

            <a href="buku.html" class="nav-link">

                <i class="bi bi-book-fill"></i>

                Buku

            </a>

        </nav>

        <button id="logoutBtn" class="logout-btn">

            <i class="bi bi-box-arrow-right"></i>

            Logout

        </button>

    </aside>

    <!-- CONTENT -->

    <main class="content">

        <h1 class="welcome">

            Selamat Datang 🌸

        </h1>

        <p id="username"></p>

        <div class="row g-4 mt-2">

            <div class="col-lg-3 col-md-6">

                <div class="card-stat">

                    <div class="icon">

                        <i class="bi bi-book-fill"></i>

                    </div>

                    <div class="number" id="countBuku">0</div>

                    <div class="label">

                        Total Buku

                    </div>

                </div>

            </div>

            <div class="col-lg-3 col-md-6">

                <div class="card-stat">

                    <div class="icon">

                        <i class="bi bi-tags-fill"></i>

                    </div>

                    <div class="number" id="countKategori">0</div>

                    <div class="label">

                        Total Kategori

                    </div>

                </div>

            </div>

            <div class="col-lg-3 col-md-6">

                <div class="card-stat">

                    <div class="icon">

                        <i class="bi bi-person-fill"></i>

                    </div>

                    <div class="number" id="countPenulis">0</div>

                    <div class="label">

                        Total Penulis

                    </div>

                </div>

            </div>

            <div class="col-lg-3 col-md-6">

                <div class="card-stat">

                    <div class="icon">

                        <i class="bi bi-people-fill"></i>

                    </div>

                    <div class="number" id="countAnggota">0</div>

                    <div class="label">

                        Total Anggota

                    </div>

                </div>

            </div>

        </div>

    </main>

</div>

<script src="../assets/js/config.js"></script>

<script src="../assets/js/logout.js"></script>

<script src="../assets/js/dashboard.js"></script>

</body>

</html>

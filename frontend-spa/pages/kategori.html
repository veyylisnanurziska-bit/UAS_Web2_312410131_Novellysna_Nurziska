<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Data Kategori</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icon -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">

</head>

<body>

<div class="wrapper">

    <!-- ================= SIDEBAR ================= -->

    <aside class="sidebar">

        <div class="logo">

            📚 E-Library

        </div>

        <nav>

            <a href="dashboard.html" class="nav-link">

                <i class="bi bi-house-door-fill"></i>

                Dashboard

            </a>

            <a href="kategori.html" class="nav-link active">

                <i class="bi bi-tags-fill"></i>

                Kategori

            </a>

            <a href="penulis.html" class="nav-link">

                <i class="bi bi-person-fill"></i>

                Penulis

            </a>

            <a href="anggota.html" class="nav-link">

                <i class="bi bi-people-fill"></i>

                Anggota

            </a>

            <a href="buku.html" class="nav-link">

                <i class="bi bi-book-fill"></i>

                Buku

            </a>

        </nav>

        <button id="logoutBtn" class="logout-btn">

            <i class="bi bi-box-arrow-right"></i>

            Logout

        </button>

    </aside>

    <!-- ================= CONTENT ================= -->

    <main class="content">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <div>

                <h2 class="welcome">

                    📂 Data Kategori

                </h2>

                <p class="text-muted">

                    Kelola kategori buku perpustakaan.

                </p>

            </div>
            <button
            class="btn btn-primary px-4 py-2 shadow-sm"
            id="btnTambah">
            <i class="bi bi-plus-circle-fill"></i>
            Tambah Kategori
        </button>

        </div>

        <!-- CARD -->

        <div class="card shadow-sm">

            <div class="card-body">

                <div class="table-responsive">

                    <table class="table align-middle">

                        <thead>

                            <thead class="table-light">

    <tr>

        <th width="80">No</th>

        <th>
            <i class="bi bi-tags-fill text-primary"></i>
            Nama Kategori
        </th>

        <th width="200" class="text-center">
            <i class="bi bi-gear-fill text-primary"></i>
            Aksi
        </th>

    </tr>

</thead>

                        <tbody id="dataKategori">

                            <tr>

                                <td colspan="3" class="text-center py-5">

                                    Loading...

                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </main>

</div>

<!-- ================= MODAL ================= -->

<div class="modal fade" id="modalKategori">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content border-0 shadow-lg rounded-4">

            <div class="modal-header border-0">

                <h5 class="modal-title" id="judulModal">

                    Tambah Kategori

                </h5>

                <button class="btn-close" data-bs-dismiss="modal"></button>

            </div>

            <div class="modal-body">

                <input
                    type="hidden"
                    id="idKategori">

                <div class="mb-3">

                    <label class="form-label fw-semibold">

                        Nama Kategori

                    </label>

                    <input
                        type="text"
                        id="namaKategori"
                        class="form-control"
                        placeholder="Masukkan nama kategori">

                </div>

            </div>

            <div class="modal-footer">

                <button
    class="btn btn-light border"
    data-bs-dismiss="modal">

    <i class="bi bi-x-circle"></i>
    Batal

</button>

                <button
    class="btn btn-success px-4"
    id="btnSimpan">

    <i class="bi bi-check-circle"></i>
    Simpan

</button>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="../assets/js/config.js"></script>

<script src="../assets/js/logout.js"></script>

<script src="../assets/js/kategori.js"></script>

</body>

</html>
